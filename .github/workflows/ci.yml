name: PanguAI CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pytest pytest-mock python-dotenv requests structlog pyarrow numpy

      - name: Run unit tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest tests/unit/ -v --tb=short
