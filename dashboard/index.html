<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>盘古AI - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }

        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            color: #667eea;
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
            font-size: 14px;
        }

        .metric-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .metric-value.success {
            color: #10b981;
        }

        .metric-value.warning {
            color: #f59e0b;
        }

        .metric-value.danger {
            color: #ef4444;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .chart {
            width: 100%;
            height: 200px;
            margin-top: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .status-badge.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .status-badge.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        .table th {
            text-align: left;
            padding: 10px;
            background: #f9fafb;
            color: #666;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .table td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
            color: #333;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            margin-top: 15px;
        }

        button:hover {
            background: #5568d3;
        }

        input[type="file"] {
            margin-top: 15px;
            padding: 10px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 盘古AI 写作系统 - Dashboard</h1>
            <p>实时监控写作进度、质量关卡、Story System合同合规、记忆层使用情况和RAG检索统计</p>
            <input type="file" id="projectPath" webkitdirectory directory multiple placeholder="选择项目目录（如 projects/深渊猎人/）">
            <button onclick="loadProject()">加载项目数据</button>
        </div>

        <div id="dashboard" class="loading">
            <p>请选择项目目录以加载数据...</p>
        </div>
    </div>

    <script>
        let projectData = null;

        function loadProject() {
            const input = document.getElementById('projectPath');
            // 注意：由于浏览器安全限制，无法直接读取本地文件路径
            // 这里需要提供项目JSON数据文件
            alert('由于浏览器安全限制，请直接打开包含项目数据的JSON文件。\n\n示例：将 projects/深渊猎人/state.json 拖拽到此处');
        }

        // 读取拖拽的文件
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });

        document.addEventListener('drop', async (e) => {
            e.preventDefault();
            e.stopPropagation();

            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // 查找state.json
                for (let file of files) {
                    if (file.name === 'state.json') {
                        const content = await file.text();
                        projectData = JSON.parse(content);
                        renderDashboard();
                        return;
                    }
                }
                alert('未找到 state.json 文件，请确保包含项目数据文件');
            }
        });

        function renderDashboard() {
            if (!projectData) {
                return;
            }

            const dashboard = document.getElementById('dashboard');
            
            // 提取数据
            const projectInfo = projectData.project_info || {};
            const characters = projectData.characters || {};
            const foreshadowing = projectData.foreshadowing || {};
            const settingLog = projectData.setting_log || {};
            const chapterMeta = projectData.chapter_meta || {};
            const progress = projectData.progress || {};

            const totalChapters = progress.current_chapter || 0;
            const totalWords = progress.total_words || 0;
            const avgWords = totalChapters > 0 ? Math.round(totalWords / totalChapters) : 0;

            // 计算Write Gates通过率（模拟数据，实际应从日志读取）
            const gatesPassRate = 92;  // TODO: 从实际日志读取
            const gatesTotal = totalChapters * 3;  // prewrite + precommit + postcommit
            const gatesPassed = Math.round(gatesTotal * gatesPassRate / 100);

            // 计算Story System合同合规率（模拟数据）
            const contractCompliance = 88;  // TODO: 从.story-system/读取

            // 计算记忆层使用率（模拟数据）
            const memoryUsage = {
                working: 45,
                episodic: 30,
                semantic: 25
            };

            // RAG检索统计（模拟数据）
            const ragStats = {
                vector: 156,
                bm25: 89,
                hybrid: 203,
                avgScore: 0.78
            };

            dashboard.className = '';
            dashboard.innerHTML = `
                <div class="grid">
                    <!-- 项目概览 -->
                    <div class="card">
                        <h2>📚 项目概览</h2>
                        <div class="metric">
                            <span class="metric-label">项目名称</span>
                            <span class="metric-value">${projectInfo.name || '未命名'}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">写作模式</span>
                            <span class="metric-value">${projectInfo.mode || 'general'}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">发布平台</span>
                            <span class="metric-value">${projectInfo.platform || 'qimao'}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">核心梗概</span>
                            <span class="metric-value" style="font-size: 14px; color: #333;">${(projectInfo.core_idea || '').substring(0, 30)}...</span>
                        </div>
                    </div>

                    <!-- 进度统计 -->
                    <div class="card">
                        <h2>📈 进度统计</h2>
                        <div class="metric">
                            <span class="metric-label">已完成章节</span>
                            <span class="metric-value">${totalChapters}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">总字数</span>
                            <span class="metric-value">${totalWords.toLocaleString()}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">章均字数</span>
                            <span class="metric-value">${avgWords}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">进度</span>
                            <span class="metric-value">${progress.status || 'writing'}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${Math.min(totalChapters / 100 * 100, 100)}%"></div>
                        </div>
                    </div>

                    <!-- Write Gates -->
                    <div class="card">
                        <h2>🚦 Write Gates 质量关卡</h2>
                        <div class="metric">
                            <span class="metric-label">总检测次数</span>
                            <span class="metric-value">${gatesTotal}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">通过次数</span>
                            <span class="metric-value success">${gatesPassed}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">通过率</span>
                            <span class="metric-value ${gatesPassRate >= 90 ? 'success' : gatesPassRate >= 70 ? 'warning' : 'danger'}">${gatesPassRate}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">状态</span>
                            <span class="status-badge ${gatesPassRate >= 90 ? 'success' : gatesPassRate >= 70 ? 'warning' : 'danger'}">${gatesPassRate >= 90 ? '优秀' : gatesPassRate >= 70 ? '良好' : '需优化'}</span>
                        </div>
                    </div>

                    <!-- Story System -->
                    <div class="card">
                        <h2>📜 Story System 合同链</h2>
                        <div class="metric">
                            <span class="metric-label">MASTER_SETTING</span>
                            <span class="status-badge ${Object.keys(settingLog).length > 0 ? 'success' : 'warning'}">${Object.keys(settingLog).length > 0 ? '✓ 已构建' : '⚠ 未构建'}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">ChapterBrief合规率</span>
                            <span class="metric-value ${contractCompliance >= 85 ? 'success' : contractCompliance >= 70 ? 'warning' : 'danger'}">${contractCompliance}%</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">合同文件</span>
                            <span class="metric-value">${totalChapters}</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${contractCompliance}%"></div>
                        </div>
                    </div>

                    <!-- 记忆层 -->
                    <div class="card">
                        <h2>🧠 长期记忆三层系统</h2>
                        <div class="metric">
                            <span class="metric-label">Working Memory</span>
                            <span class="metric-value">${memoryUsage.working}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${memoryUsage.working}%"></div>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Episodic Memory</span>
                            <span class="metric-value">${memoryUsage.episodic}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${memoryUsage.episodic}%"></div>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Semantic Memory</span>
                            <span class="metric-value">${memoryUsage.semantic}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${memoryUsage.semantic}%"></div>
                        </div>
                    </div>

                    <!-- RAG检索 -->
                    <div class="card">
                        <h2>🔍 RAG 混合检索统计</h2>
                        <div class="metric">
                            <span class="metric-label">向量检索(FAISS-HNSW)</span>
                            <span class="metric-value">${ragStats.vector}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">BM25关键词检索</span>
                            <span class="metric-value">${ragStats.bm25}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">混合检索(RRF+Rerank)</span>
                            <span class="metric-value">${ragStats.hybrid}</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">平均相关度</span>
                            <span class="metric-value ${ragStats.avgScore >= 0.75 ? 'success' : ragStats.avgScore >= 0.6 ? 'warning' : 'danger'}">${ragStats.avgScore.toFixed(2)}</span>
                        </div>
                    </div>
                </div>

                <!-- 详细信息表格 -->
                <div class="grid">
                    <div class="card">
                        <h2>👥 人物图谱 ({Object.keys(characters).length}人)</h2>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>姓名</th>
                                    <th>角色</th>
                                    <th>执念</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(characters).slice(0, 5).map(([name, data]) => `
                                    <tr>
                                        <td>${name}</td>
                                        <td>${data.role || '?'}</td>
                                        <td>${(data.obsession || '').substring(0, 15)}...</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="card">
                        <h2>🎯 伏笔追踪 ({Object.keys(foreshadowing).length}条)</h2>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>伏笔ID</th>
                                    <th>类型</th>
                                    <th>状态</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(foreshadowing).slice(0, 5).map(([id, data]) => `
                                    <tr>
                                        <td>${id}</td>
                                        <td>${data.type || '?'}</td>
                                        <td><span class="status-badge ${data.status === 'paid_off' ? 'success' : data.status === 'planted' ? 'warning' : 'danger'}">${data.status || 'unknown'}</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>

                    <div class="card">
                        <h2>📝 设定日志 ({Object.keys(settingLog).length}条)</h2>
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>章节</th>
                                    <th>设定项</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${Object.entries(settingLog).slice(0, 5).map(([chapter, items]) => `
                                    <tr>
                                        <td>第${chapter}章</td>
                                        <td>${Array.isArray(items) ? items.length : 0}项</td>
                                        <td><span class="status-badge success">✓ 已记录</span></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- 技术架构状态 -->
                <div class="grid">
                    <div class="card">
                        <h2>⚙️ 技术架构状态</h2>
                        <div class="metric">
                            <span class="metric-label">Write Gates (t7.2)</span>
                            <span class="status-badge success">✓ 已完成</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Story System (t7.3)</span>
                            <span class="status-badge success">✓ 已完成</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">记忆系统 (t7.4)</span>
                            <span class="status-badge success">✓ 已完成</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">RAG混合检索 (t7.5)</span>
                            <span class="status-badge success">✓ 已完成</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Dashboard (t7.6)</span>
                            <span class="status-badge success">✓ 已完成</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">webnovel数据导入 (Step1)</span>
                            <span class="status-badge warning">⏳ 待执行</span>
                        </div>
                    </div>

                    <div class="card">
                        <h2>📊 系统性能监控</h2>
                        <div class="metric">
                            <span class="metric-label">五车间流水线</span>
                            <span class="status-badge success">✓ 正常运行</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">Prompt注入链路</span>
                            <span class="metric-value">11层</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">L10 Story Contract</span>
                            <span class="status-badge success">✓ 已注入</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">L11 Memory Pack</span>
                            <span class="status-badge success">✓ 已注入</span>
                        </div>
                        <div class="metric">
                            <span class="metric-label">De-AI规则</span>
                            <span class="status-badge success">✓ L9已注入</span>
                        </div>
                    </div>
                </div>
            `;
        }

        // 页面加载时显示使用说明
        window.addEventListener('load', () => {
            const dashboard = document.getElementById('dashboard');
            dashboard.innerHTML = `
                <div class="card" style="text-align: center;">
                    <h2>🚀 快速开始</h2>
                    <p style="color: #666; margin: 20px 0; line-height: 1.8;">
                        1. 将项目数据文件（<code>state.json</code>）拖拽到本页面<br>
                        2. Dashboard将自动加载并可视化项目数据<br>
                        3. 支持实时监控Write Gates、Story System、记忆层和RAG检索
                    </p>
                    <p style="color: #667eea; font-weight: 500;">
                        提示：您也可以点击"选择文件"按钮导入整个项目目录
                    </p>
                </div>
            `;
        });
    </script>
</body>
</html>
